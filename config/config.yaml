data:
  # 本机调试路径（Windows）
  raw_dir: "Source/data/data/data"
  # 服务器训练路径（AutoDL）
  # raw_dir: "/root/autodl-tmp/tep_data"
  processed_dir: "results/processed_cache"

training:
  window_size: 50       # 滑动窗口大小（时间步数）
  stride: 1             # 滑动窗口步长
  batch_size: 64        # 训练批大小
  lr: 1.0e-3            # Adam 学习率
  epochs_per_task: 50   # 每个增量任务训练轮数
  use_amp: true         # 混合精度训练（AMP）
  num_workers: 4        # DataLoader 并行进程数（Windows下如报错改为0）

ewc:
  lambda: 1000          # EWC 正则项强度（原5000过大，累积后压制新任务学习）
  fisher_samples: 500   # 估计 Fisher 矩阵使用的样本数

replay:
  buffer_size_per_class: 200  # 每类保留的记忆样本数（原50导致严重过拟合）
  balanced_replay: true       # 动态平衡：replay量按旧类数自适应扩展

model:
  cnn_channels: [128, 256]   # 1D-CNN 各层输出通道数
  transformer_layers: 4      # Transformer 编码层数
  transformer_heads: 8       # 多头注意力头数
  d_model: 256               # 特征嵌入维度
  dropout: 0.1               # Dropout 比率

evaluation:
  num_classes: 22            # 总类别数（正常+21种故障）

task_split:
  # 增量任务类别划分（全局标签）
  task_0: [0, 1, 2, 3]
  task_1: [4, 5, 6, 7, 8]
  task_2: [9, 10, 11, 12, 13, 14]
  task_3: [15, 16, 17, 18, 19, 20, 21]

seed: 42  # 全局随机种子
